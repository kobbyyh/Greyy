<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greyy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color: #fff;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
}

h1, h2 {
    font-family: 'Playfair Display', serif;
}

.hero {
    height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.hero h1 {
    font-size: 3rem;
}

.btn-gold {
    background: #d4af37;
    border: none;
    color: black;
}

/* MESSAGE */
.message {
    max-width: 600px;
    margin:auto;
    font-size: 1.1rem;
    line-height: 1.8;
    min-height: 200px;
}

/* IMAGE STYLE */
.photo-card {
    background: #111;
    padding:10px;
    border-radius:15px;
    text-align:center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    transition:0.3s;
}

.photo-card:hover {
    transform: translateY(-5px);
}

.photo-card img {
    width:100%;
    border-radius:10px;
}

/* VIDEO STYLE */
.video-card {
    background:#111;
    padding:10px;
    border-radius:15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

video {
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
}

/* HEARTS */
.heart {
    position: fixed;
    bottom: -10px;
    color: #ff4d6d;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(0); opacity:1;}
    100% {transform: translateY(-100vh); opacity:0;}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>Happy Birthday</h1>
        <h2 class="mt-2">Grace Abena Obema Agyekum ❤️</h2>
        <!-- <button class="btn btn-gold mt-4" onclick="scrollToMessage()">Read This</button> -->
    </div>
</section>

<!-- MESSAGE -->
<section class="container py-5 text-center">
    <h2 class="mb-4">For You</h2>
    <h2 class="mb-4" style="color: pink;">23.04</h2>
    <div id="typedText" class="message"></div>
</section>

<!-- PHOTO -->
<section class="container py-5">
    <!-- <h2 class="text-center mb-4">You</h2> -->
    <div class="row justify-content-center">
        <div class="col-md-4 col-6">
            <div class="photo-card">
                <img src="1.jpeg">
                <small>my favorite view</small>
            </div>
        </div>
    </div>
</section>

<!-- VIDEOS -->
<section class="container py-5">
    <h2 class="text-center mb-4">Memories</h2>
    <div class="row g-4">

        <div class="col-md-4 col-6">
            <div class="video-card">
                <video controls autoplay muted loop playsinline  src="2.mp4"></video>
            </div>
        </div>

        <div class="col-md-4 col-6">
            <div class="video-card">
                <video controls autoplay muted loop playsinline  src="3.mp4" ></video>
            </div>
        </div>

        <div class="col-md-4 col-6">
            <div class="video-card">
                <video controls autoplay muted loop playsinline src="4.mp4"></video>
            </div>
        </div>

        <div class="col-md-4 col-6">
            <div class="video-card">
                <video controls autoplay muted loop playsinline src="5.mp4"></video>
            </div>
        </div>

        <div class="col-md-4 col-6">
            <div class="video-card">
                <video controls autoplay muted loop playsinline src="6.mp4"></video>
            </div>
        </div>

        <div class="col-md-4 col-6">
            <div class="video-card">
                <video controls autoplay muted loop playsinline src="7.mp4"></video>
            </div>
        </div>

    </div>
</section>

<!-- FINAL -->
<section class="text-center py-5">
    <h2>Happy Birthday Greyy❤️</h2>
    <p>— Kayy</p>
</section>

<script>
function scrollToMessage(){
    document.getElementById("typedText").scrollIntoView({behavior:"smooth"});
}

/* TYPING EFFECT */
const text = `I just want to wish you a happy birthday, Grace.

I’m sorry for what happened back then.

I’m still learning... still growing into a better person.

I truly wish you happiness and peace.

And maybe, someday, you might find a space in your heart to forgive me.

Today is yours... and I hope it’s beautiful.`;

let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("typedText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 30);
    }
}
typeWriter();

/* FLOATING HEARTS */
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = Math.random()*10 + 15 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
